<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0f 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .status {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .label {
            color: #888;
        }
        .value {
            color: #4ecdc4;
            font-weight: 600;
        }
        .badge {
            display: inline-block;
            background: #4ecdc4;
            color: #0a0a0f;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 10px;
        }
        .footer {
            margin-top: 30px;
            color: #444;
            font-size: 12px;
        }
        .routes {
            margin: 15px 0;
            font-family: monospace;
            font-size: 13px;
            color: #666;
        }
        .routes span {
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }
        .online {
            color: #4ecdc4;
            font-weight: 600;
        }
        .offline {
            color: #ff6b6b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>API Gateway</h1>
        <p class="subtitle">Game Configuration Server</p>
        
        <div class="status">
            <div class="status-item">
                <span class="label">Server Status</span>
                <span class="value online">● Online</span>
            </div>
            <div class="status-item">
                <span class="label">Service</span>
                <span class="value">Config API</span>
            </div>
            <div class="status-item">
                <span class="label">Version</span>
                <span class="value">1.0.0</span>
            </div>
        </div>
        
        <div class="routes">
            <span>/</span> → Web Interface
            <span>/ver.php</span> → Game Config
            <span>/health</span> → Health Check
        </div>
        
        <span class="badge">🟢 CONFIG SERVER RUNNING</span>
        
        <div class="footer">
            Game API Server • All systems operational
        </div>
    </div>
</body>
  </html>
